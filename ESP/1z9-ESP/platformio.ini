; PlatformIO Project Configuration File
; 1 z 9 — zwykly ESP32 (WROOM-32 DevKit): WiFi + JSON API + UART do Arduino Uno
;
; UART do Uno: Serial2 -> GPIO16 (RX), GPIO17 (TX). Wspolna masa GND.
; Uno steruje panelami LED i lampkami przyciskow (D11/D12/D13) - ESP tylko
; wysyla komendy i odbiera BTN po UART. Szczegoly zlacz w src/main.cpp.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 460800

; Schemat partycji z zapasem na aplikacje (obsluga duzych stringow JSON)
board_build.partitions = default.csv

lib_deps =
    bblanchon/ArduinoJson@^7.0.4
